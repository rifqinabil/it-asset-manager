<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IT ASSET MANAGEMENT</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
     <!---- INI HEADER ---->
     <header class="header">
        <h1>IT ASSET MANAGEMENT</h1>
        <p>kelola semua asset dalam satu dashboard</p>
     </header>

     <!---- konten utama ----->
     <main class="main-content">

        <!---- dashboard isi penyimpanan ------>
        <section class="stats-container" id="stats-container">
            <div class="stats-card">
                <span class="stats-number" id="total-assets">0</span>
                <span class="stat-label">Total asset</span>
            </div>
            <div class="stats-card">
                <span class="stats-number" id="active-assets">0</span>
                <span class="stat-label">Aktif</span>
            </div>
            <div class="stats-card">
                <span class="stats-number" id="maintenance-assets">0</span>
                <span class="stats-label">Maintenance</span>
            </div>
            <div class="stats-card">
                <span class="stats-number" id="retired-assets">0</span>
                <span class="stats-label">Retired</span>
            </div>
        </section>
        <section class="chart-section" style="background: var(--bg-card); border: 1px solid var(--border-color); border-radius: var(--radius-lg); padding: 24px; margin-bottom: 32px; display: flex; justify-content: center; height: 300px;">
            <canvas id="assetChart">
            </canvas>
        </section>

        <!---- isi aset nya ------->
        <section class="table-section">
            <div class="table-header">
                <h2>Daftar Aset</h2>
                <div class="table-actions" style="display: flex; gap: 10px; align-items: center;">
                    <input type="text" id="search-input" placeholder="Cari aset..." class="search-box">

                    <select id="filter-status" class="filter-box">
                        <option value="All">Semua</option>
                        <option value="Active">Aktif</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Retired">Retired</option>
                    </select>

                    <button class="btn btn-primary" id="btn-add-asset">Tambah Aset</button>

                </div>  
            </div>
            <table class="asset-table" id="asset-table">
                <thead>
                    <tr>
                        <th>id</th>
                        <th>nama aset</th>
                        <th>kategori</th>
                        <th>status</th>
                        <th>user</th>
                        <th>aksi</th>
                    </tr>
                </thead>
                <tbody id="asset-table-body">
                </tbody>
            </table>
        </section>
        </section>

        <!-- Modal Form Tambah/Edit Aset -->
        <div id="asset-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">Tambah Aset</h2>
                    <span class="close-modal" id="close-modal">&times;</span>
                </div>
                <form id="asset-form">
                    <input type="hidden" id="asset-id">
                    <div class="form-group">
                        <label>Nama Aset</label>
                        <input type="text" id="asset-nama" required placeholder="Contoh: Dell Latitude 5520">
                    </div>
                    <div class="form-group">
                        <label>Kategori</label>
                        <select id="asset-kategori" required>
                            <option value="">Pilih Kategori...</option>
                            <option value="Hardware">Hardware</option>
                            <option value="Software">Software</option>
                            <option value="Network">Network</option>
                            <option value="Peripheral">Peripheral</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="asset-status" required>
                            <option value="Active">Active</option>
                            <option value="Maintenance">Maintenance</option>
                            <option value="Retired">Retired</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Assigned User</label>
                        <input type="text" id="asset-user" required placeholder="Contoh: Budi - IT Dept">
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 10px;">Simpan Aset</button>
                </form>
            </div>
        </div>

     </main>

     <script src="app.js"></script>
</body>
</html>
